<div class="page-header">
  <h1><i class="fa-solid fa-clipboard-check"></i> Discharge Counseling</h1>
  <p>บันทึกข้อมูลการให้คำแนะนำผู้ป่วยก่อนกลับบ้าน</p>
</div>

<div class="card">
  <div class="form-row">
    <div class="form-group">
      <label class="required">วันที่ทำ Discharge Counseling</label>
      <input type="date" id="counseling-date" class="form-input">
    </div>
    <div class="form-group">
      <label class="required">AN (เลข 9 หลัก)</label>
      <input type="text" id="counseling-an" class="form-input" maxlength="9" inputmode="numeric" placeholder="เช่น 000123456">
      <div id="an-error" class="error-message">กรุณากรอก AN ให้ครบ 9 หลัก (ตัวเลขเท่านั้น)</div>
    </div>
  </div>
</div>
