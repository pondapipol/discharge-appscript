function initForms() {

// ==========================================
// Page Navigation
// ==========================================
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });

  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelector('.nav-item[data-page="' + pageId + '"]').classList.add('active');

  // Only load data on first visit, use refresh button for updates
  if (pageId === 'dashboard' && !currentDashboardData) {
    loadDashboard();
  }
  if (pageId === 'report' && !document.getElementById('report-month').value) {
    loadReportSummary();
  }
}

// ==========================================
// Checkbox Section Toggle
// ==========================================
function toggleSection(sectionId) {
  var body = document.getElementById(sectionId);
  var header = body.previousElementSibling;

  body.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

function toggleStandaloneCheckbox(container) {
  var cb = container.querySelector('input[type="checkbox"]');
  if (event.target !== cb && event.target.tagName !== 'LABEL') {
    cb.checked = !cb.checked;
    // Trigger onchange for category 8
    if (cb.onchange) cb.onchange();
  }
}

function toggleOtherText() {
  var cb = document.getElementById('cb-38');
  var container = document.getElementById('other-text-container');
  if (cb && container) {
    container.style.display = cb.checked ? 'block' : 'none';
    if (!cb.checked) {

// ==========================================
// AN Validation
// ==========================================
function validateAN() {
  var input = document.getElementById('counseling-an');
  var error = document.getElementById('an-error');
  var value = input.value.trim();

  if (!value || !/^\d{9}$/.test(value)) {
    input.classList.add('error');
    error.classList.add('visible');
    return false;
  }

  input.classList.remove('error');
  error.classList.remove('visible');
  return true;
}

// ==========================================
// Counseling Form Submit (with upsert)
// ==========================================
function submitCounselingForm(forceUpsert) {
  var date = document.getElementById('counseling-date').value;
  if (!date) {
    showToast('กรุณาเลือกวันที่', 'error');
    return;
  }

  if (!validateAN()) {
    showToast('กรุณากรอก AN ให้ครบ 9 หลัก', 'error');
    return;
  }

  var checkboxes = {};
  var anyChecked = false;
  document.querySelectorAll('#page-counseling input[type="checkbox"][data-key]').forEach(function(cb) {
    checkboxes[cb.dataset.key] = cb.checked;
    if (cb.checked) anyChecked = true;
  });

  // Auto-derive Cat_5_6_SJS_TEN_Risk: true if any 5.6 sub-item is checked
  var any56 = ['Cat_5_6_SCARs_Allopurinol', 'Cat_5_6_SCARs_TMP_SMX', 'Cat_5_6_SCARs_Carbamazepine',
    'Cat_5_6_SCARs_Phenobarbital', 'Cat_5_6_SCARs_Phenytoin', 'Cat_5_6_SCARs_Nevirapine']
    .some(function(k) { return checkboxes[k]; });
  checkboxes['Cat_5_6_SJS_TEN_Risk'] = any56;

  if (!anyChecked) {
    showToast('กรุณาเลือกอย่างน้อย 1 รายการ', 'error');
    return;
  }

  var freeText = '';
  var otherTextEl = document.getElementById('other-text');
  if (otherTextEl) freeText = otherTextEl.value.trim();

  var formData = {
    counselingDate: date,
    an: document.getElementById('counseling-an').value.trim(),
    checkboxes: checkboxes,
    freeText: freeText,
    forceUpsert: forceUpsert || false
  };

  showLoading();
  google.script.run
    .withSuccessHandler(function(result) {
      hideLoading();
      if (result.confirmUpsert) {
        if (confirm(result.message)) {
          submitCounselingForm(true);
        }
      } else if (result.success) {
        showToast(result.message, 'success');
        resetCounselingForm();
      } else {
        showToast(result.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    })
    .submitCounselingData(formData);
}

function resetCounselingForm() {
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('counseling-date').value = today;
  document.getElementById('counseling-an').value = '';
  document.getElementById('counseling-an').classList.remove('error');
  document.getElementById('an-error').classList.remove('visible');
  document.querySelectorAll('#page-counseling input[type="checkbox"]').forEach(function(cb) {
    cb.checked = false;
  });
  var otherText = document.getElementById('other-text');
  if (otherText) otherText.value = '';
  var otherContainer = document.getElementById('other-text-container');
  if (otherContainer) otherContainer.style.display = 'none';
}

// ==========================================
// DC Form Submit (with confirmation)
// ==========================================
function submitDCForm() {
  var date = document.getElementById('dc-date').value;
  var countStr = document.getElementById('dc-count').value;
  var error = document.getElementById('dc-error');

  if (!date) {
    showToast('กรุณาเลือกวันที่', 'error');
    return;
  }

  var count = parseInt(countStr, 10);
  if (isNaN(count) || count < 0) {
    document.getElementById('dc-count').classList.add('error');
    error.classList.add('visible');
    showToast('กรุณากรอกจำนวนที่ถูกต้อง', 'error');
    return;
  }

  document.getElementById('dc-count').classList.remove('error');
  error.classList.remove('visible');

  // Check for existing record
  showLoading();
  google.script.run
    .withSuccessHandler(function(result) {
      if (result.exists) {
        hideLoading();
        if (confirm('วันที่นี้มีข้อมูลแล้ว (จำนวนเดิม: ' + result.currentCount + ')\nต้องการแทนที่ด้วยข้อมูลใหม่หรือไม่?')) {
          showLoading();
          doSubmitDC(date, countStr);
        }
      } else {
        doSubmitDC(date, countStr);
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    })
    .checkExistingDC(date);
}

function doSubmitDC(date, countStr) {

// ==========================================

function initTimeInputs() {
  document.querySelectorAll('.time-input').forEach(function(input) {
    input.addEventListener('input', function() {
      var raw = this.value.replace(/\D/g, '');
      if (raw.length > 4) raw = raw.slice(0, 4);
      if (raw.length > 2) {
        this.value = raw.slice(0, 2) + ':' + raw.slice(2);
      } else {
        this.value = raw;
      }
      this.classList.toggle('filled', raw.length === 4);
    });

    input.addEventListener('focus', function() { this.select(); });

    input.addEventListener('blur', function() {
      var raw = this.value.replace(/\D/g, '');
      if (raw.length === 4) {
        var h = parseInt(raw.slice(0, 2));
        var m = parseInt(raw.slice(2, 4));
        if (h > 23 || m > 59) {
          this.value = '';
          this.classList.remove('filled');
        }
      } else if (raw.length > 0) {
        this.value = '';
        this.classList.remove('filled');
      }
    });
  });
}

// ==========================================
// Dashboard
// ==========================================
function loadDashboard() {
  google.script.run
    .withSuccessHandler(function(months) {
      var select = document.getElementById('dashboard-month');
      var currentVal = select.value;
      select.innerHTML = '<option value="">-- กรุณาเลือกเดือน --</option>';

      if (!months || months.length === 0) {
        document.getElementById('dashboard-empty').style.display = 'block';
        return;
      }

      document.getElementById('dashboard-empty').style.display = 'none';

      months.forEach(function(ym) {
        var opt = document.createElement('option');
        opt.value = ym;
        opt.textContent = formatThaiMonth(ym);
        select.appendChild(opt);
      });

      if (currentVal && months.indexOf(currentVal) >= 0) {
        select.value = currentVal;
      } else {
        select.value = months[0];
      }

      onMonthChange();
    })
    .withFailureHandler(function(err) {
      console.error('Failed to load months:', err);
    })
    .getAvailableMonths();
}

function onMonthChange() {
  var yearMonth = document.getElementById('dashboard-month').value;
  if (!yearMonth) return;

  currentYearMonth = yearMonth;
  showLoading();

  google.script.run
    .withSuccessHandler(function(data) {
      hideLoading();
      currentDashboardData = data;
      currentFieldConfig = data.fieldConfig;
      renderDashboard(data, yearMonth);
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดข้อมูลไม่สำเร็จ: ' + err.message, 'error');
    })
    .getDashboardData(yearMonth);
}

function renderDashboard(data, yearMonth) {
  var counseling = data.counseling;
  var dcTotal = data.dc.reduce(function(sum, d) { return sum + d.count; }, 0);
  var peMonth = data.pe.find(function(p) { return p.month === yearMonth; });
  var peTotal = peMonth ? peMonth.totalErrors : 0;

  // Stat cards
  document.getElementById('stat-counseling').textContent = counseling.totalUniquePatients;
  document.getElementById('stat-discharge').textContent = dcTotal;
  document.getElementById('stat-pe').textContent = peTotal;

  // Month labels on chart cards
  var monthLabel = formatThaiMonth(yearMonth);
  var monthLabelEls = ['chart1-month-label', 'chart2-month-label', 'chart3-month-label', 'scars-month-label', 'summary-month-label'];
  monthLabelEls.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = monthLabel;
  });

  // Summary table
  renderSummaryTable(counseling);

  // SCARs table
  renderScarsTable(counseling.scarsItems);

  // SCARs patient detail table
  renderSCARsDetailTable(counseling.scarsPatientRows);

  // Charts
  renderTopCategoriesChart(counseling.topLevelCounts);
  renderDetailedDrugsChart();
  renderDailyDCChart(data.dc);
  renderPEMonthlyChart(data.pe);
}

// Shared: compute category count consistently (sum sub-items for 5.1/5.6, topLevel for others)
function getCategoryCount(counseling, cat) {
  var allItems = counseling.allItemCounts || {};
  var topLevel = counseling.topLevelCounts || {};
  if (cat === '5.1') {
    var sum = 0;
    Object.keys(allItems).forEach(function(k) {
      if (k.indexOf('Cat_5_1_') === 0) sum += (allItems[k] || 0);
    });
    return sum;
  }
  if (cat === '5.6') {
    var sum = 0;
    Object.keys(allItems).forEach(function(k) {
      if (k.indexOf('Cat_5_6_SCARs_') === 0) sum += (allItems[k] || 0);
    });
    return sum;
  }
  return topLevel[cat] || 0;
}

function renderSummaryTable(counseling) {
  var tbody = document.getElementById('summary-table-body');
  var categories = ['5.1', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7', '5.8'];
  var total = 0;
  var html = '';

  categories.forEach(function(cat) {
    var count = getCategoryCount(counseling, cat);
    total += count;
    html += '<tr><td>' + TOP_LEVEL_LABELS[cat] + '</td><td>' + count + '</td></tr>';
  });

  tbody.innerHTML = html;
  document.getElementById('summary-total').textContent = total;
}

function renderScarsTable(scarsItems) {
  var tbody = document.getElementById('scars-table-body');
  if (!scarsItems) {
    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color: var(--text-light);">ไม่มีข้อมูล</td></tr>';
    return;
  }
  var html = '';
  var scarsOrder = ['Allopurinol', 'Trimethoprim + Sulfamethoxazole (Bactrim)', 'Carbamazepine', 'Phenobarbital', 'Phenytoin', 'Nevirapine'];
  scarsOrder.forEach(function(label) {
    var count = scarsItems[label] || 0;
    html += '<tr><td>' + label + '</td><td>' + count + '</td></tr>';
  });
  tbody.innerHTML = html;
}

// ==========================================
// SCARs Patient Detail Table + XLSX Download
// ==========================================
function renderSCARsDetailTable(rows) {
  var tbody = document.getElementById('scars-detail-tbody');
  var btn = document.getElementById('btn-download-scars');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-light);">ไม่มีข้อมูลในเดือนนี้</td></tr>';
    btn.disabled = true;
    return;
  }
  var html = '';
  rows.forEach(function(row) {
    var displayDate = formatThaiDate(row.date);
    var drugs = row.drugs.map(function(d) { return escapeHtml(d); }).join(', ');
    html += '<tr><td>' + displayDate + '</td><td>' + escapeHtml(row.an) + '</td><td>' + drugs + '</td></tr>';
  });
  tbody.innerHTML = html;
  btn.disabled = false;
}

function formatThaiDate(isoDate) {
  if (!isoDate) return '';
  var parts = isoDate.split('-');
  var year = parseInt(parts[0], 10) + 543;
  var month = parseInt(parts[1], 10) - 1;
  var day = parseInt(parts[2], 10);
  return day + ' ' + THAI_MONTHS[month] + ' ' + year;
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function downloadSCARsXLSX() {
  if (typeof XLSX === 'undefined') {
    showToast('ไม่สามารถโหลด SheetJS ได้ กรุณารีเฟรชหน้าเว็บ', 'error');
    return;
  }
  if (!currentDashboardData || !currentDashboardData.counseling) return;
  var rows = currentDashboardData.counseling.scarsPatientRows || [];
  if (rows.length === 0) {
    showToast('ไม่มีข้อมูลที่จะดาวน์โหลด', 'info');
    return;
  }
  var wsData = [['วันที่', 'AN', 'ชื่อยา']];
  rows.forEach(function(row) {
    wsData.push([formatThaiDate(row.date), row.an, row.drugs.join(', ')]);
  });
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 20 }, { wch: 14 }, { wch: 60 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'SCARs_' + (currentYearMonth || 'data'));
  XLSX.writeFile(wb, 'SCARs_Patients_' + (currentYearMonth || 'data') + '.xlsx');
}

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

};

function renderDetailedDrugsChart() {
  destroyChart('chart-detailed-drugs');
  var ctx = document.getElementById('chart-detailed-drugs').getContext('2d');

  var selectedCat = document.getElementById('chart-category-filter').value;
  var allItemCounts = currentDashboardData ? currentDashboardData.counseling.allItemCounts : {};
  var fieldConfig = currentFieldConfig || [];

  // Filter fields by selected category, in array order, skip text and top-level-only
  var filteredFields = fieldConfig.filter(function(f) {
    return f.category === selectedCat;
  });

  // For categories with sub-items (5.1, 5.6), show only sub-items
  var hasSubItems = filteredFields.some(function(f) { return f.subgroup !== null && f.subgroup !== undefined; });
  if (hasSubItems) {
    filteredFields = filteredFields.filter(function(f) { return f.subgroup !== null && f.subgroup !== undefined; });
  }

  var labels = filteredFields.map(function(f) { return f.label; });
  var values = filteredFields.map(function(f) { return allItemCounts[f.key] || 0; });

  if (labels.length === 0) {
    labels = [TOP_LEVEL_LABELS[selectedCat] || selectedCat];
    var topLevelCounts = currentDashboardData ? currentDashboardData.counseling.topLevelCounts : {};
    values = [topLevelCounts[selectedCat] || 0];
  }

  var bgColors = labels.map(function(_, i) {
    var palette = [COLORS.seaBreeze, COLORS.periwinkle, COLORS.honey];
    return palette[i % 3];
  });

  chartInstances['chart-detailed-drugs'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'จำนวน (ครั้ง)',
        data: values,
        backgroundColor: bgColors,
        borderColor: bgColors,
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) { return ctx.parsed.x + ' ครั้ง'; }
          }
        },
        datalabels: datalabelsConfig
      },
      scales: {
        x: {
          beginAtZero: true,
          title: { display: true, text: 'จำนวน (ครั้ง)', font: { family: 'Athiti' } },
          ticks: { stepSize: 1, font: { family: 'Athiti' } },
          grid: { color: 'rgba(0,0,0,0.05)' }
        },
        y: {
          ticks: { font: { family: 'Athiti', size: 11 }, autoSkip: false },
          grid: { display: false }
        }

    }
  });
}

// ==========================================
// Report Summary Page
// ==========================================
function loadReportSummary() {
  google.script.run
    .withSuccessHandler(function(months) {
      var select = document.getElementById('report-month');
      if (!select) return;
      var currentVal = select.value;
      select.innerHTML = '<option value="">-- กรุณาเลือกเดือน --</option>';

      if (!months || months.length === 0) return;

      months.forEach(function(ym) {
        var opt = document.createElement('option');
        opt.value = ym;
        opt.textContent = formatThaiMonth(ym);
        select.appendChild(opt);
      });

      if (currentVal && months.indexOf(currentVal) >= 0) {
        select.value = currentVal;
      } else {
        select.value = months[0];
      }

      onReportMonthChange();
    })
    .withFailureHandler(function(err) {
      console.error('Failed to load report months:', err);
    })
    .getAvailableMonths();
}

function onReportMonthChange() {
  var yearMonth = document.getElementById('report-month').value;
  if (!yearMonth) return;

  showLoading();
  google.script.run
    .withSuccessHandler(function(data) {
      hideLoading();
      renderReportTable(data);
      var dlBtn = document.getElementById('btn-download-report');
      if (dlBtn) dlBtn.disabled = false;
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('โหลดข้อมูลไม่สำเร็จ: ' + err.message, 'error');
    })
    .getReportSummaryData(yearMonth);
}

function renderReportTable(data) {
  var c = data.counseling;
  var allItems = c.allItemCounts || {};
  var topLevel = c.topLevelCounts || {};

  // Fill in all item counts
  document.querySelectorAll('#report-table [data-field-key]').forEach(function(td) {
    var key = td.dataset.fieldKey;
    td.textContent = allItems[key] || 0;
  });

  // Fill in top-level counts and conditional ผลลัพธ์ (reuse shared getCategoryCount)
  var grandTotal = 0;
  document.querySelectorAll('#report-table [data-top-level]').forEach(function(td) {
    var cat = td.dataset.topLevel;
    var count = getCategoryCount(c, cat);
    td.textContent = count;
    grandTotal += count;

    // Show/hide ผลลัพธ์ text based on count
    var resultTd = td.parentElement.querySelector('.result-text');
    if (resultTd) {
      resultTd.textContent = count > 0 ? 'ผู้ป่วยเข้าใจปฏิบัติได้ถูกต้อง' : '';
    }
  });

  // Summary rows
  // รวมทั้งหมด (ครั้ง) = sum of all category header values displayed above
  var totalEl = document.getElementById('report-total-sessions');
  if (totalEl) totalEl.textContent = grandTotal;

  // รวมทั้งหมด (ราย) = count of AN rows in month (with upsert, 1 row per AN per day)
  var patientsEl = document.getElementById('report-total-patients');
  if (patientsEl) patientsEl.textContent = c.totalUniquePatients;

  var dcEl = document.getElementById('report-dc-total');
  if (dcEl) dcEl.textContent = data.dcTotal;

  var peEl = document.getElementById('report-pe-total');
  if (peEl) peEl.textContent = data.peTotal;

  var pePctEl = document.getElementById('report-pe-pct');
  if (pePctEl) pePctEl.textContent = data.pePercentage.toFixed(2);
}

function downloadReportXLSX() {
  if (typeof XLSX === 'undefined') {
    showToast('ไม่สามารถโหลด SheetJS ได้ กรุณารีเฟรชหน้าเว็บ', 'error');
    return;
  }
  var table = document.getElementById('report-table');
  if (!table) return;

  var yearMonth = document.getElementById('report-month').value || 'data';
  var wsData = [];

  // Header row
  wsData.push(['รายละเอียด', 'Discharge Counseling (ครั้ง)', 'ผลลัพธ์']);

  // Body rows
  var rows = table.querySelectorAll('tbody tr');
  rows.forEach(function(tr) {
    var cells = tr.querySelectorAll('td');
    if (cells.length >= 2) {
      var detail = cells[0].textContent.trim();
      var count = cells[1].textContent.trim();
      var result = cells.length >= 3 ? cells[2].textContent.trim() : '';
      wsData.push([detail, isNaN(count) ? count : Number(count), result]);
    }
  });

  // Footer rows
  var footRows = table.querySelectorAll('tfoot tr');
  footRows.forEach(function(tr) {
    var cells = tr.querySelectorAll('td');
    if (cells.length >= 2) {
      var detail = cells[0].textContent.trim();
      var count = cells[1].textContent.trim();
      wsData.push([detail, isNaN(count) ? count : Number(count), '']);
    }
  });

  var ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{ wch: 50 }, { wch: 25 }, { wch: 30 }];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report_' + yearMonth);
  XLSX.writeFile(wb, 'Report_Summary_' + yearMonth + '.xlsx');
}

// ==========================================
// Save Chart as Image (best-effort)
// ==========================================
function saveChartAsImage(canvasId) {
  try {
    var canvas = document.getElementById(canvasId);
    var link = document.createElement('a');
    link.download = canvasId + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    showToast('ไม่สามารถบันทึกรูปภาพได้', 'error');
  }
}

// ==========================================
// Utilities
// ==========================================
function formatThaiMonth(yearMonth) {
  if (!yearMonth) return '';
  var parts = yearMonth.split('-');
  var year = parseInt(parts[0], 10) + 543;
  var monthIdx = parseInt(parts[1], 10) - 1;
  return THAI_MONTHS[monthIdx] + ' ' + year;
}

function showLoading() {
  document.getElementById('loading-overlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.add('hidden');
}

function showToast(message, type) {
  var container = document.getElementById('toast-container');
  var toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'info');

  var icon = type === 'success' ? 'fa-check-circle' :
             type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

  toast.innerHTML = '<i class="fa-solid ' + icon + '"></i> ' + message;
  container.appendChild(toast);

  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(function() { toast.remove(); }, 300);
  }, 3000);
}
